---
layout: default
---

<article class="book-review">
  <div class="book-header">
    <h1>{{ page.title }}</h1>
    <p class="book-meta">
      {{ page.author }}
      &nbsp;&middot;&nbsp;
      <span class="rating">
        {%- for i in (1..5) -%}
          {%- if i <= page.rating -%}&#9733;{%- else -%}&#9734;{%- endif -%}
        {%- endfor -%}
      </span>
      &nbsp;&middot;&nbsp;
      Read {{ page.date_read | date: "%B %Y" }}
    </p>
  </div>

  {% if page.cover_image %}
  <img src="{{ page.cover_image | relative_url }}" alt="Cover of {{ page.title }}" class="book-cover">
  {% endif %}

  <div class="book-body">
    {{ content }}
  </div>

  <a href="{{ '/' | relative_url }}" class="back-link">&larr; Back to index</a>
</article>
