---
layout: default
title: Books
---

<ul class="book-list">
  {% assign books = site.posts | sort: "date" | reverse %}
  {% for book in books %}
  <li class="book-item">
    <a href="{{ book.url | relative_url }}">
      <p class="book-title">{{ book.title }}</p>
      <p class="book-author">{{ book.author }}</p>
      <p class="book-rating">
        {%- for i in (1..5) -%}
          {%- if i <= book.rating -%}<span class="star-filled">&#9733;</span>{%- else -%}<span class="star-empty">&#9733;</span>{%- endif -%}
        {%- endfor -%}
      </p>
    </a>
  </li>
  {% endfor %}
</ul>
